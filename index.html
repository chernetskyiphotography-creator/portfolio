<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHERNETSKYI | Photography</title>
    <!-- Тонкий та мінімалістичний шрифт Montserrat -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { margin: 0; background: #fff; color: #000; font-family: 'Montserrat', sans-serif; text-align: center; overflow-x: hidden; letter-spacing: 0.15em; }
        
        #cover { height: 100vh; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #cover-img { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #cover::after { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.2); z-index: 2; }
        
        .logo-container { position: relative; z-index: 3; color: #fff; }
        .logo-text { font-size: 3rem; letter-spacing: 0.5em; text-transform: uppercase; font-weight: 200; margin: 0; }
        .sub-logo { font-size: 0.8rem; letter-spacing: 0.4em; margin-top: 15px; text-transform: uppercase; opacity: 0.8; }

        .content-wrapper { position: relative; background: #fff; z-index: 10; padding-bottom: 50px; min-height: 100vh; }
        .about-section { max-width: 700px; margin: 0 auto; padding: 80px 20px; color: #333; line-height: 1.6; font-weight: 300; }
        
        .category-wrapper { margin-bottom: 80px; }
        .category-hero { position: relative; width: 100vw; height: 60vh; cursor: pointer; overflow: hidden; }
        .category-hero img { width: 100%; height: 100%; object-fit: cover; transition: 0.6s; }
        .category-hero:hover img { transform: scale(1.03); }
        .hero-title { position: absolute; top: 50%; left: 0; width: 100%; transform: translateY(-50%); font-size: 1.2rem; letter-spacing: 0.6em; text-transform: uppercase; color: #fff; text-shadow: 0 2px 10px rgba(0,0,0,0.6); z-index: 2; pointer-events: none; font-weight: 300; }
        
        .nav-gallery { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px; display: flex; justify-content: center; flex-wrap: wrap; }
        .nav-gallery span { margin: 10px; text-transform: uppercase; color: #999; font-size: 10px; letter-spacing: 0.2em; cursor: pointer; transition: 0.3s; font-weight: 300; }
        .nav-gallery span:hover, .nav-gallery span.active { color: #000; }
        
        .back-btn { cursor: pointer; display: inline-block; margin-bottom: 30px; text-transform: uppercase; font-size: 10px; letter-spacing: 0.2em; text-decoration: underline; font-weight: 300; }
        
        .masonry-gallery { column-count: 3; column-gap: 15px; max-width: 1200px; margin: auto; padding: 0 10px; }
        .masonry-gallery a { margin-bottom: 15px; display: block; break-inside: avoid; }
        .masonry-gallery img { width: 100%; height: auto; display: block; transition: 0.3s; }
        .masonry-gallery img:hover { opacity: 0.8; transform: scale(1.01); }

        footer { padding: 50px 20px; color: #777; background: #f9f9f9; border-top: 1px solid #eee; margin-top: 50px; font-weight: 300; }
        
        .contact-phone { display: block; color: #000; text-decoration: none; font-size: 0.8rem; letter-spacing: 0.15em; font-weight: 300; margin-bottom: 20px; }
        
        .contact-buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .social-link { display: inline-block; font-size: 0.7rem; color: #000; text-decoration: none; border: 1px solid #ccc; padding: 8px 16px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.15em; font-weight: 300; transition: 0.3s; }
        .social-link:hover { background: #eee; border-color: #999; }

        @media (max-width: 900px) { .masonry-gallery { column-count: 2; } }
        @media (max-width: 600px) {
            .category-hero { height: 40vh; }
            .hero-title { font-size: 0.9rem; letter-spacing: 0.4em; }
            .masonry-gallery { column-count: 1; }
            .logo-text { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <img src="cover.jpg" id="cover-img" alt="Background">
    <div id="cover">
        <div class="logo-container">
            <div class="logo-text">CHERNETSKYI</div>
            <div class="sub-logo">PHOTOGRAPHY</div>
        </div>
    </div>

    <div class="content-wrapper">
        <div id="dynamic-area">
            <div class="about-section">
                <h2>Євгеній Чернецький</h2>
                <p>Я український фотограф, створюю ваші історії, які залишаються з вами назавжди. Маю 15-річний досвід, понад 500 весільних пар, тисячі індивідуальних зйомок та івентів.</p>
            </div>
            <div id="cards-container">
                <script>
                    function createCard(id, title, img) {
                        document.write(`
                            <div class="category-wrapper">
                                <div class="category-hero" onclick="openGallery('${id}')">
                                    <img src="${img}1.jpg" alt="${title}">
                                    <div class="hero-title">${title}</div>
                                </div>
                                <div class="category-description" style="margin-top:20px;"><h3>${title}</h3></div>
                            </div>
                        `);
                    }
                    createCard('wedding', 'WEDDING', 'wedding');
                    createCard('individual', 'INDIVIDUAL', 'ind');
                    createCard('promo', 'COMMERCIAL', 'promo');
                    createCard('male', 'MALE PORTRAITS', 'male');
                    createCard('kids', 'KIDS', 'kids');
                    createCard('interior', 'INTERIOR', 'inter');
                    createCard('lovestory', 'LOVE STORY', 'love');
                </script>
            </div>
            
            <footer>
                <a href="tel:+380635332571" class="contact-phone">+38 (063) 53-32-571</a>
                <div class="contact-buttons">
                    <a href="https://www.instagram.com/chernetskyi_photography/" target="_blank" class="social-link">INSTAGRAM</a>
                    <a href="https://t.me/CHERNETSKYI_PHOTO" target="_blank" class="social-link">TELEGRAM</a>
                </div>
            </footer>
        </div>
    </div>

    <script>
        function openGallery(id) {
            const configs = { 
                'wedding': { p: 'wedding', c: 8 }, 'individual': { p: 'ind', c: 8 }, 
                'promo': { p: 'promo', c: 8 }, 'male': { p: 'male', c: 8 },
                'kids': { p: 'kids', c: 8 }, 'interior': { p: 'inter', c: 8 }, 'lovestory': { p: 'love', c: 8 }
            };
            
            let html = `
                <div class="gallery-page" style="display:block; padding-top: 50px;">
                    <div class="back-btn" onclick="location.reload()">← BACK</div>
                    <div class="nav-gallery">
                        <span onclick="openGallery('wedding')">WEDDING</span>
                        <span onclick="openGallery('individual')">INDIVIDUAL</span>
                        <span onclick="openGallery('promo')">COMMERCIAL</span>
                        <span onclick="openGallery('male')">MALE</span>
                        <span onclick="openGallery('kids')">KIDS</span>
                        <span onclick="openGallery('interior')">INTERIOR</span>
                        <span onclick="openGallery('lovestory')">LOVE STORY</span>
                    </div>
                    <h2 style="margin-bottom:50px; font-weight:300; letter-spacing:0.3em;">${id.replace('lovestory', 'LOVE STORY').toUpperCase()}</h2>
                    <div class="masonry-gallery">`;
            
            for(let i=1; i<=configs[id].c; i++) {
                html += `<a href="${configs[id].p}${i}.jpg" data-lightbox="${id}"><img src="${configs[id].p}${i}.jpg"></a>`;
            }
            html += `</div>
            <footer>
                <a href="tel:+380635332571" class="contact-phone">+38 (063) 53-32-571</a>
                <div class="contact-buttons">
                    <a href="https://www.instagram.com/chernetskyi_photography/" target="_blank" class="social-link">INSTAGRAM</a>
                    <a href="https://t.me/CHERNETSKYI_PHOTO" target="_blank" class="social-link">TELEGRAM</a>
                </div>
            </footer>
            </div>`;
            
            document.getElementById('dynamic-area').innerHTML = html;
            window.scrollTo({ top: document.querySelector('.content-wrapper').offsetTop, behavior: 'smooth' });
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHERNETSKYI | Photography</title>
    <!-- Підключаємо Lightbox для збільшення фото -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/css/lightbox.min.css" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Helvetica Neue', sans-serif; text-align: center; }
        #cover { height: 100vh; width: 100%; position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #cover-img { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        #cover::after { content: ""; position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2; }
        .logo-container { position: relative; z-index: 3; }
        .logo-text { font-size: 3rem; letter-spacing: 0.5em; text-transform: uppercase; font-weight: 200; margin: 0; }
        .sub-logo { font-size: 0.8rem; letter-spacing: 0.4em; color: #fff; margin-top: 15px; text-transform: uppercase; opacity: 0.8; }
        nav { padding: 40px; position: sticky; top: 0; background: #000; z-index: 100; border-bottom: 1px solid #222; }
        nav a { color: #fff; margin: 0 15px; text-transform: uppercase; cursor: pointer; text-decoration: none; font-size: 11px; letter-spacing: 2px; }
        .about-section { max-width: 600px; margin: 80px auto; padding: 20px; color: #ccc; line-height: 1.6; }
        .section-header { font-size: 1.5rem; margin: 80px 0 40px; letter-spacing: 5px; }
        /* Зменшені фото */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 10px; max-width: 1200px; margin: auto; }
        .gallery a { display: block; height: 250px; }
        .gallery img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .gallery img:hover { opacity: 0.7; }
        footer { padding: 80px 20px; color: #444; }
        /* Мобільна адаптація */
        @media (max-width: 600px) { 
            .logo-text { font-size: 1.8rem; }
            .sub-logo { font-size: 0.6rem; letter-spacing: 0.2em; }
            .gallery { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .gallery a { height: 180px; }
        }
    </style>
</head>
<body>
    <div id="cover">
        <img src="cover.jpg" id="cover-img" alt="Background">
        <div class="logo-container">
            <div class="logo-text">CHERNETSKYI</div>
            <div class="sub-logo">Твій особистий фотограф</div>
        </div>
    </div>
    <div class="about-section">
        <h2>Про мене</h2>
        <p>Я створюю візуальні історії, які залишаються з вами назавжди. Мій підхід — це мінімалізм, емоції та увага до деталей у кожному кадрі.</p>
    </div>
    <nav>
        <a href="#wedding">Весілля</a>
        <a href="#individual">Індивідуальні</a>
        <a href="#promo">Рекламні</a>
        <a href="#male">Чоловіча</a>
        <a href="#kids">Дитячі</a>
    </nav>
    <div id="wedding" class="section-header">ВЕСІЛЛЯ</div>
    <div class="gallery">
        <a href="wedding1.jpg" data-lightbox="wedding"><img src="wedding1.jpg"></a>
        <a href="wedding2.jpg" data-lightbox="wedding"><img src="wedding2.jpg"></a>
    </div>
    <!-- ... Додайте інші розділи за аналогією ... -->
    <footer>
        <a href="tel:+380635332571" style="color: #fff; text-decoration: none; font-size: 1.2rem;">+38 (063) 53-32-571</a>
    </footer>
    <!-- Скрипти для збільшення фото -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.3/js/lightbox.min.js"></script>
</body>
</html>
